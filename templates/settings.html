{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<div class="page-head">
    <div>
        <h1>Settings</h1>
        <div class="sub">Currency and your category tree</div>
    </div>
</div>

<!-- Currency -->
<div class="glass panel" style="margin-bottom:1.4rem">
    <h2>Currency</h2>
    <form method="post" action="{{ url_for('save_currency') }}" style="display:flex;gap:.8rem;align-items:end;max-width:340px">
        <div class="fg" style="flex:1">
            <label>Display currency</label>
            <select name="currency">
                {% for code, sym in currencies.items() %}
                <option value="{{ code }}" {% if settings.currency==code %}selected{% endif %}>{{ code }} ({{ sym }})</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn">Save</button>
    </form>
</div>

<!-- Category manager -->
<div class="glass panel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.7rem">
        <h2 style="margin:0">Category tree</h2>
        <div style="display:flex;gap:.6rem;flex-wrap:wrap">
            <button class="btn ghost sm" id="add-l1">+ Top category</button>
            <button class="btn sm" id="save-cats">Save changes</button>
        </div>
    </div>
    <div class="cat-mgr" id="cat-mgr"></div>
</div>

<div class="toast hidden" id="toast"></div>
{% endblock %}

{% block scripts %}
<script>
let TREE = {{ settings.category_hierarchy|tojson }};
const mgr = document.getElementById('cat-mgr');
const expanded = new Set();  // which top-level categories are open

function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text !== undefined) e.textContent = text;
    return e;
}

function actBtn(label, act, data, danger) {
    const b = el('button', 'icon-btn' + (danger ? ' danger' : ''), label);
    b.dataset.act = act;
    Object.entries(data).forEach(([k, v]) => b.dataset[k] = v);
    return b;
}

function render() {
    mgr.innerHTML = '';
    Object.keys(TREE).forEach(c1 => {
        const subs = Object.keys(TREE[c1]);
        const node = el('div', 'cat-node');

        // Header row: chevron | name | count | fixed-width actions
        const head = el('div', 'cat-head');
        head.dataset.c1 = c1;
        head.appendChild(el('span', 'chev', expanded.has(c1) ? '▾' : '▸'));
        head.appendChild(el('span', 'cat-name', c1));
        head.appendChild(el('span', 'cat-count', String(subs.length)));
        const hActions = el('span', 'head-actions');
        hActions.appendChild(actBtn('＋', 'add2', {c1}));
        hActions.appendChild(actBtn('✕', 'del1', {c1}, true));
        head.appendChild(hActions);
        node.appendChild(head);

        // Body: one block row per sub-category
        const body = el('div', 'cat-body' + (expanded.has(c1) ? '' : ' hidden'));
        if (!subs.length) {
            body.appendChild(el('div', 'cat-empty', 'No sub-categories yet'));
        }
        subs.forEach(c2 => {
            const row = el('div', 'sub-row');
            const sh = el('div', 'sub-head');
            sh.appendChild(el('span', 'sub-name', c2));
            const sActions = el('span', 'head-actions');
            sActions.appendChild(actBtn('＋', 'add3', {c1, c2}));
            sActions.appendChild(actBtn('✕', 'del2', {c1, c2}, true));
            sh.appendChild(sActions);
            row.appendChild(sh);

            const leaves = TREE[c1][c2] || [];
            if (leaves.length) {
                const chips = el('div', 'chip-row');
                leaves.forEach(l3 => {
                    const chip = el('span', 'chip', l3 + ' ');
                    const x = el('span', 'mini-x', '✕');
                    x.dataset.act = 'del3';
                    x.dataset.c1 = c1; x.dataset.c2 = c2; x.dataset.c3 = l3;
                    chip.appendChild(x);
                    chips.appendChild(chip);
                });
                row.appendChild(chips);
            }
            body.appendChild(row);
        });
        node.appendChild(body);
        mgr.appendChild(node);
    });
}

mgr.addEventListener('click', (e) => {
    const t = e.target.closest('[data-act]');
    if (!t) {
        // Click on a header (not an action) toggles expand/collapse
        const head = e.target.closest('.cat-head');
        if (head) {
            const c1 = head.dataset.c1;
            expanded.has(c1) ? expanded.delete(c1) : expanded.add(c1);
            render();
        }
        return;
    }
    const {act, c1, c2, c3} = t.dataset;
    if (act === 'del1') { if (confirm(`Delete "${c1}" and all its sub-categories?`)) { delete TREE[c1]; expanded.delete(c1); } }
    if (act === 'del2') delete TREE[c1][c2];
    if (act === 'del3') TREE[c1][c2] = TREE[c1][c2].filter(x => x !== c3);
    if (act === 'add2') { const n = prompt('New sub-category under ' + c1); if (n) { TREE[c1][n] = TREE[c1][n] || []; expanded.add(c1); } }
    if (act === 'add3') { const n = prompt(`New sub-sub under ${c1} › ${c2}`); if (n && !TREE[c1][c2].includes(n)) { TREE[c1][c2].push(n); expanded.add(c1); } }
    render();
});

document.getElementById('add-l1').addEventListener('click', () => {
    const n = prompt('New top-level category');
    if (n && !TREE[n]) { TREE[n] = {}; render(); }
});

function toast(msg, ok=true) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = ok ? '' : 'linear-gradient(135deg,#ec4899,#ef4444)';
    t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 3000);
}

document.getElementById('save-cats').addEventListener('click', async () => {
    const body = new FormData();
    body.append('hierarchy', JSON.stringify(TREE));
    try {
        const res = await fetch('{{ url_for("save_categories") }}', { method: 'POST', body });
        const data = await res.json();
        toast(data.success ? 'Category tree saved ✓' : 'Save failed', data.success);
    } catch (err) { toast('Save failed', false); }
});

render();
</script>
{% endblock %}
